name: Build and Release

on:
  push:
    tags:
      - 'build-*' # Срабатывает при добавлении префикса build- к версии.

jobs:
  build:
    runs-on: windows-latest 

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.202' 

    - name: Build EXE
      run: dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishReadyToRun=true -o ./publish

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./publish/WinFormsAppEdu.exe
          ./Program.cs
          ./Form1.cs
          ./Form1.Designer.cs
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}